<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Governance Hub{% block title_suffix %}{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1318;
            --bg-surface: #161b22;
            --bg-card: #1c2128;
            --bg-card-hover: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-dim: #6e7681;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --accent-orange: #f0883e;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            margin-right: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-brand svg { width: 22px; height: 22px; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .nav-links a:hover { color: var(--text); background: var(--bg-card); }
        .nav-links a.active { color: var(--text); background: var(--bg-card); }
        .main-content { padding: 24px; max-width: 1600px; margin: 0 auto; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .card-body { padding: 18px; }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }
        .kpi-card:hover { border-color: var(--accent); }
        .kpi-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.1;
        }
        .kpi-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .pill-approve { background: rgba(63,185,80,0.15); color: var(--accent-green); }
        .pill-review { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
        .pill-reject { background: rgba(248,81,73,0.15); color: var(--accent-red); }
        .pill-info { background: rgba(88,166,255,0.15); color: var(--accent); }
        .pill-warning { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
        .pill-critical { background: rgba(248,81,73,0.15); color: var(--accent-red); }
        .pill-low { background: rgba(63,185,80,0.15); color: var(--accent-green); }
        .pill-medium { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
        .pill-high { background: rgba(248,81,73,0.15); color: var(--accent-red); }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 24px;
        }
        .chart-container { position: relative; height: 280px; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(48,54,61,0.5);
        }
        tr:hover td { background: var(--bg-card-hover); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .banner {
            background: rgba(210,153,34,0.1);
            border: 1px solid var(--accent-yellow);
            border-radius: var(--radius);
            padding: 12px 18px;
            margin-bottom: 18px;
            color: var(--accent-yellow);
            font-size: 13px;
        }
        .banner-error {
            background: rgba(248,81,73,0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .loading {
            color: var(--text-dim);
            font-size: 13px;
            padding: 24px;
            text-align: center;
        }
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 18px;
        }
        .alerts-panel {
            max-height: 700px;
            overflow-y: auto;
        }
        .alert-item {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(48,54,61,0.5);
            font-size: 13px;
        }
        .alert-item:last-child { border-bottom: none; }
        .drift-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(48,54,61,0.5);
        }
        .gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .gauge-value {
            font-size: 48px;
            font-weight: 700;
        }
        .gauge-bar {
            width: 100%;
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            margin-top: 16px;
            overflow: hidden;
            position: relative;
        }
        .gauge-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s;
        }
        .gauge-thresholds {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 6px;
            font-size: 10px;
            color: var(--text-dim);
        }
        input[type="text"], input[type="url"], input[type="number"], select {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 10px 14px;
            font-size: 14px;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .metric-def {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(48,54,61,0.5);
        }
        .metric-def:last-child { border-bottom: none; }
        .metric-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .metric-desc {
            font-size: 13px;
            color: var(--text-muted);
        }
        .metric-value-inline {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-top: 6px;
        }
        .collapsible-header {
            cursor: pointer;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.15s;
        }
        .collapsible-header:hover { background: var(--bg-card-hover); }
        .collapsible-body {
            display: none;
            padding: 18px;
        }
        .collapsible-body.open { display: block; }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            align-items: center;
        }
        .filter-bar label {
            font-size: 13px;
            color: var(--text-muted);
        }
        .filter-bar select, .filter-bar input {
            width: auto;
            min-width: 120px;
        }
        @media (max-width: 1100px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { padding: 12px; }
            .navbar { padding: 0 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            AI Governance Hub
        </a>
        <div class="nav-links">
            <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/measure" class="{% if request.path == '/measure' %}active{% endif %}">Measure</a>
            <a href="/contract" class="{% if request.path == '/contract' %}active{% endif %}">Contract</a>
            <a href="/raw" class="{% if request.path == '/raw' %}active{% endif %}">Raw</a>
            <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">Settings</a>
        </div>
    </nav>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
